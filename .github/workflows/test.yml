name: Test

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - .github/workflows/**
      - '!.github/workflows/test.yml'
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 22
  PNPM_VERSION: 10.13.1
  RUST_TOOLCHAIN: nightly-2025-12-04
  # Replaced blacksmith-16vcpu-ubuntu-2404 (BloopAI's paid Blacksmith fleet)
  RUNNER_LABEL: &runner_label ubuntu-latest

jobs:
  changes:
    runs-on: *runner_label
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      # backend-remote kept so path changes still trigger the build workflow
      backend-remote: ${{ steps.filter.outputs['backend-remote'] }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@0bc4621a3135347011ad047f9ecf449bf72ce2bd # v3.0.0
        id: filter
        with:
          filters: |
            frontend:
              - 'packages/local-web/**'
              - 'packages/web-core/**'
              - 'packages/remote-web/**'
              - 'packages/ui/**'
              - 'shared/**'
              - 'scripts/check-i18n.sh'
              - 'scripts/check-unused-i18n-keys.mjs'
              - 'scripts/check-legacy-frontend-paths.sh'
              - 'scripts/legacy-frontend-paths-allowlist.txt'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.npmrc'
              - '.github/workflows/test.yml'
              - '.github/actions/**'
            backend:
              - 'crates/api-types/**'
              - 'crates/db/**'
              - 'crates/deployment/**'
              - 'crates/executors/**'
              - 'crates/git/**'
              - 'crates/local-deployment/**'
              - 'crates/mcp/**'
              - 'crates/review/**'
              - 'crates/server/**'
              - 'crates/services/**'
              - 'crates/utils/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'shared/**'
              - 'scripts/prepare-db.js'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'rustfmt.toml'
              - 'rust-toolchain.toml'
              - '.cargo/**'
              - '.github/workflows/test.yml'
              - '.github/actions/**'
            backend-remote:
              - 'crates/remote/**'
              - 'crates/api-types/**'
              - 'crates/utils/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'shared/**'
              - 'rustfmt.toml'
              - 'rust-toolchain.toml'
              - '.cargo/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.github/workflows/test.yml'
              - '.github/actions/**'
            # tauri filter removed — desktop app not built in this fork

  frontend-checks:
    needs: changes
    if: always() && (needs.changes.outputs.frontend == 'true' || needs.changes.result == 'skipped')
    runs-on: *runner_label
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: pnpm install

      - name: Run frontend checks
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npx concurrently \
            --kill-others-on-fail \
            --names "local:lint,local:fmt,local:build,remote:fmt,remote:build,ui:check,ui:lint,ui:fmt,core:check,core:fmt,i18n,i18n:unused,legacy" \
            --timings \
            "cd packages/local-web && npm run lint" \
            "cd packages/local-web && npm run format:check" \
            "cd packages/local-web && npm run build" \
            "cd packages/remote-web && npm run format:check" \
            "cd packages/remote-web && npm run build" \
            "cd packages/ui && npm run check" \
            "cd packages/ui && npm run lint" \
            "cd packages/ui && npm run format:check" \
            "cd packages/web-core && npm run check" \
            "cd packages/web-core && npm run format:check" \
            "GITHUB_BASE_REF=${{ github.base_ref || 'main' }} ./scripts/check-i18n.sh" \
            "node scripts/check-unused-i18n-keys.mjs" \
            "./scripts/check-legacy-frontend-paths.sh"

  backend-schema-checks:
    needs: changes
    if: always() && (needs.changes.outputs.backend == 'true' || needs.changes.result == 'skipped')
    runs-on: *runner_label
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/cargo-checks-common-setup
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          cache-key: backend-schema-checks-${{ runner.os }}-${{ runner.arch }}-${{ env.RUNNER_LABEL }}
          setup-node: 'true'
          setup-sqlx-cli: 'true'

      - name: Check generated types
        run: npm run generate-types:check

      - name: Sqlx checks
        run: npm run prepare-db:check

  # backend-remote-checks removed: crates/remote and crates/relay-tunnel
  # depend on private BloopAI Cargo git deps fetched via VK_PRIVATE_DEPLOY_KEY,
  # a secret scoped to the upstream org. The remote image is validated by the
  # Docker build in build.yml instead.

  backend-clippy:
    needs: changes
    if: always() && (needs.changes.outputs.backend == 'true' || needs.changes.result == 'skipped')
    runs-on: *runner_label
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/cargo-checks-common-setup
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
          cache-key: backend-clippy-${{ runner.os }}-${{ runner.arch }}-${{ env.RUNNER_LABEL }}

      - name: Run Clippy and fmt checks
        run: |
          set -x
          cargo fmt --all -- --check & pid_fmt=$!
          cargo clippy --workspace --all-targets --exclude vibe-kanban-tauri -- -D warnings
          wait $pid_fmt

  backend-test:
    needs: changes
    if: always() && (needs.changes.outputs.backend == 'true' || needs.changes.result == 'skipped')
    runs-on: *runner_label
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/cargo-checks-common-setup
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          cache-key: backend-test-${{ runner.os }}-${{ runner.arch }}-${{ env.RUNNER_LABEL }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run Cargo tests
        run: cargo nextest run --workspace --exclude vibe-kanban-tauri

  # tauri-checks removed — desktop app (crates/tauri-app) is not part of
  # this fork's build target.
name: Build and publish images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (e.g. v1.0.1)"
        required: true
        default: "latest"
  push:
    tags:
      - "v*"

concurrency:
  group: build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  set-vars:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      owner_lc: ${{ steps.vars.outputs.owner_lc }}
    steps:
      - name: Resolve tag and lowercase owner
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"

  build:
    needs: set-vars
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: remote-server
            image_name: vibekanban-remote
            dockerfile: crates/remote/Dockerfile

          - name: executor
            image_name: vibekanban-executor
            dockerfile: Dockerfile.executor

          - name: relay
            image_name: vibekanban-relay
            dockerfile: crates/relay-tunnel/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        shell: bash
        run: |
          echo "name=ghcr.io/${{ needs.set-vars.outputs.owner_lc }}/${{ matrix.image_name }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          labels: |
            org.opencontainers.image.title=${{ matrix.name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.set-vars.outputs.tag }}

      - name: Resolve build args — remote-server
        if: matrix.name == 'remote-server'
        id: remote-args
        shell: bash
        run: |
          cat <<'EOF' >> "$GITHUB_OUTPUT"
          value<<ARGS_EOF
          VITE_RELAY_API_BASE_URL=${{ vars.VITE_RELAY_API_BASE_URL }}
          PUBLIC_BASE_URL=${{ vars.PUBLIC_BASE_URL }}
          REMOTE_SERVER_PORT=${{ vars.REMOTE_SERVER_PORT }}
          ARGS_EOF
          EOF

      - name: Build and push — ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.name == 'remote-server' && steps.remote-args.outputs.value || '' }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ needs.set-vars.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: true
          sbom: true